name: Test
on:
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to checkout (defaults to the triggering ref)'
        required: false
        type: string
        default: ''

jobs:
  Test:
    name: Run tests
    strategy:
      matrix:
        os: [ ubuntu-latest,windows-latest ]
        jdk: [ 11,17,25 ]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.jdk }}
      - name: Run tests
        run: mvn -B clean verify -DwithIts
